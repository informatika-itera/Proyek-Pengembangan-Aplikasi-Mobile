name: CI

on:
  push:
    branches:
      - main
      - develop
      - "Project/123140169-123140186-MoveIn"
  pull_request:
    branches:
      - main
      - develop
      - "Project/123140169-123140186-MoveIn"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle Wrapper Jar (Fix Jarfile Error)
        run: |
          mkdir -p gradle/wrapper
          wget -O gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar

      - name: Create Mock local.properties for Gemini API Key
        run: echo 'GEMINI_API_KEY="mock_key_for_ci_build"' > local.properties

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Compile Assemble Debug
        run: ./gradlew assembleDebug

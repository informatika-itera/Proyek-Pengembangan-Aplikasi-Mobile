name: CI

on:
  push:
    branches:
      - main
      - develop
      - "Project/123140169-123140186-MoveIn"
  pull_request:
    branches:
      - main
      - develop
      - "Project/123140169-123140186-MoveIn"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew test

      - name: Compile Assemble Debug
        run: ./gradlew assembleDebug

name: CI

on:
  push:
    branches: [ main, develop, 'project/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties
          echo "AIzaSyAJoPFVxOEhK86MCtscJAyVwYCd6PWv2hE=${{ secrets.AIzaSyAJoPFVxOEhK86MCtscJAyVwYCd6PWv2hE }}" >> local.properties

      - name: Run unit tests
        run: ./gradlew :composeApp:testDebugUnitTest --no-daemon

      - name: Build debug APK
        run: ./gradlew :composeApp:assembleDebug --no-daemon

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            **/build/reports/tests/
            **/build/test-results/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: tabungin-debug
          path: composeApp/build/outputs/apk/debug/*.apk

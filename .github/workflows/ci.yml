name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build & Test (Android)
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout kode
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Beri permission ke gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Buat local.properties (CI tidak punya file ini)
      #    Gemini API key di-inject dari GitHub Secrets
      - name: Create local.properties
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> local.properties
          echo "sdk.dir=$ANDROID_HOME" >> local.properties

      # 5. Jalankan unit tests
      - name: Run unit tests
        run: ./gradlew test --stacktrace

      # 6. Build APK debug
      - name: Build Debug APK
        run: ./gradlew :composeApp:assembleDebug --stacktrace

      # 7. (Opsional) Upload APK sebagai artifact — berguna untuk review
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: nutriscan-debug-apk
          path: composeApp/build/outputs/apk/debug/*.apk
          retention-days: 7
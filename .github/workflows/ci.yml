name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Base Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # --- TAMBAHKAN LANGKAH INI ---
      - name: Create Mock local.properties for Build
        run: echo GEMINI_API_KEY=\"mock_api_key_for_ci\ > local.properties

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Run All Unit Tests
        run: ./gradlew test

      - name: Compile and Build Debug APK
        run: ./gradlew assembleDebug
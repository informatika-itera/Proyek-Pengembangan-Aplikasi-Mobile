name: CI

on:
  push:
    branches:
      - project/123140116-123140135-TripMate
  pull_request:
    branches:
      - project/123140116-123140135-TripMate

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Grant execute permission
        run: chmod +x gradlew
      - name: Run tests
        run: ./gradlew test
      - name: Build debug APK
        run: ./gradlew assembleDebug

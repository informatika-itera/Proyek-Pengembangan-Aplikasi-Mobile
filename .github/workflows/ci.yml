name: CI

on:
  push:
    branches: [ "main", "develop", "project/123140094-123140092-FinTrack" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'local.properties.example'
  pull_request:
    branches: [ "main", "develop", "project/123140094-123140092-FinTrack" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'local.properties.example'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Base Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Membuat file dummy agar server GitHub tidak crash karena local.properties di-ignore
      - name: Create Mock local.properties for Build
        run: |
          echo "GEMINI_API_KEY=dummy_key_for_ci" > local.properties
          echo "EXCHANGE_RATE_API_KEY=dummy_key_for_ci" >> local.properties

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Run All Unit Tests
        run: ./gradlew test --parallel --build-cache

      - name: Compile and Build Debug APK
        run: ./gradlew :composeApp:assembleDebug --parallel --build-cache